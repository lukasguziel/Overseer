name: Release

# main IS the release branch: every push to main runs the gates, rebuilds the
# zip and REPLACES the release of the version currently stamped in the repo
# (the tag moves to the released commit). Work happens on feature/* branches;
# a PR merged into main publishes. Tag push and workflow_dispatch remain as
# manual fallbacks. Curated notes are written afterwards with
# `gh release edit` and survive asset refreshes.

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.1.0) — tag + release are created with this name"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      # A main push carries no tag: the version stamped in the repo IS the
      # release being replaced (rolling release).
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="$GITHUB_REF_NAME"
          else
            V="v$(python -c "import json; print(json.load(open('frontend/package.json'))['version'])")"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "Releasing $V"

      # PEP-440 prereleases (1.0.0rc1) differ from the tag form (1.0.0-rc1),
      # so pyproject is only compared for stable versions.
      - name: Version gate — all version stamps must agree
        run: |
          V="${VERSION#v}"
          fail=0
          grep -qF "__version__ = \"$V\"" src/overseer/__init__.py \
            || { echo "::error::src/overseer/__init__.py is not $V"; fail=1; }
          grep -qF "\"version\": \"$V\"" frontend/package.json \
            || { echo "::error::frontend/package.json is not $V"; fail=1; }
          case "$V" in
            *-*) echo "prerelease — skipping pyproject.toml + bl_info (integer/PEP-440 forms differ)" ;;
            *) grep -qF "version = \"$V\"" pyproject.toml \
                 || { echo "::error::pyproject.toml is not $V"; fail=1; }
               # The Blender addon carries the version as an int tuple in bl_info;
               # reconstruct "a.b.c" and compare (stable versions only).
               BL="$(python -c "import ast,re; t=open('blender_addon/__init__.py').read(); m=re.search(r'\"version\":\s*(\([0-9, ]+\))', t); print('.'.join(str(x) for x in ast.literal_eval(m.group(1))) if m else '')")"
               [ "$BL" = "$V" ] \
                 || { echo "::error::blender_addon bl_info version is '$BL', not $V"; fail=1; } ;;
          esac
          exit $fail

      # --- Gate: same checks as CI ---
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python lint + tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          ruff check src tests
          pytest

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend tests + build (-> src/web/)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm run build

      # Pillow for C4D's interpreter (CPython 3.11, win_amd64) — shipped INSIDE
      # the plugin so the artist never pip-installs into Cinema's Python. The
      # wheel is fetched here rather than committed, so no binaries in git.
      - name: Vendor Pillow (cp311 / win_amd64)
        run: python .claude/skills/release/vendor_pillow.py

      # --- Package: same layout as deploy.ps1 produces ---
      - name: Assemble plugin folder
        run: |
          pkg=dist/Overseer
          mkdir -p "$pkg"
          cp src/overseer.pyp "$pkg/"
          cp src/logo.png "$pkg/"
          cp src/config.example.json "$pkg/"
          cp LICENSE "$pkg/"
          # The whole package, not just its top-level modules: overseer/ has
          # subpackages (core, naming, structure, cinema) and a flat *.py glob
          # silently shipped a plugin that cannot import itself.
          cp -r src/overseer "$pkg/overseer"
          find "$pkg/overseer" -name __pycache__ -type d -prune -exec rm -rf {} +
          cp -r src/vendor "$pkg/vendor"
          find "$pkg/vendor" -name __pycache__ -type d -prune -exec rm -rf {} +
          cp -r src/web "$pkg/web"

      - name: Zip (Cinema 4D)
        run: cd dist && zip -r "Overseer-$VERSION.zip" Overseer

      # Same shared package + web build + Pillow, wrapped as an installable
      # Blender addon (one top folder `overseer/` = the addon). Reuses the exact
      # layout deploy_blender.ps1 mirrors and build_blender_zip.py assembles, so
      # the Blender download and the dev deploy never diverge.
      - name: Zip (Blender addon)
        run: python .claude/skills/release/build_blender_zip.py

      # On a main push the tag follows the release: same version, new content.
      # (GITHUB_TOKEN pushes never re-trigger workflows, so no recursion.)
      - name: Move tag to this commit
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git tag -f "$VERSION"
          git push origin "refs/tags/$VERSION" --force

      # No generate_release_notes: curated notes are set afterwards by the
      # release skill (no autogenerated commit lists in the release body).
      # On refresh only the asset is replaced — the release body survives.
      - name: Create or refresh the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: |
            One codebase, two hosts — same web UI and features on both.

            ## Cinema 4D  (`Overseer-${{ steps.version.outputs.version }}.zip`)

            Unzip, copy the `Overseer` folder into your Cinema 4D `plugins`
            folder, restart Cinema 4D, then press `Shift+C` and search for
            **"Overseer"**.

            ## Blender  (`Overseer-Blender-${{ steps.version.outputs.version }}.zip`)

            *Edit > Preferences > Add-ons > Install…*, pick the zip, enable
            **Overseer**, then open it from the 3D Viewport sidebar (**N**) >
            **Overseer** tab. Blender 4.2 LTS+.
        run: |
          BVER="${VERSION#v}"
          C4D_ZIP="dist/Overseer-$VERSION.zip"
          BL_ZIP="dist/Overseer-Blender-v$BVER.zip"
          if gh release view "$VERSION" --json name > /dev/null 2>&1; then
            gh release upload "$VERSION" "$C4D_ZIP" "$BL_ZIP" --clobber
          else
            gh release create "$VERSION" --title "Overseer $VERSION" \
              --notes "$BODY" "$C4D_ZIP" "$BL_ZIP"
          fi
