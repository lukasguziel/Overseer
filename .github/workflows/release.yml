name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.2.0) — tag + release are created with this name"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v7

      # --- Gate: same checks as CI ---
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python lint + tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          ruff check src tests
          pytest

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend tests + build (-> src/web/)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm run build

      # Pillow for C4D's interpreter (CPython 3.11, win_amd64) — shipped INSIDE
      # the plugin so the artist never pip-installs into Cinema's Python. The
      # wheel is fetched here rather than committed, so no binaries in git.
      - name: Vendor Pillow (cp311 / win_amd64)
        run: python tools/vendor_pillow.py

      # --- Package: same layout as deploy.ps1 produces ---
      - name: Assemble plugin folder
        run: |
          pkg=dist/Overseer
          mkdir -p "$pkg"
          cp src/overseer.pyp "$pkg/"
          cp src/so_logo.png "$pkg/"
          cp src/config.example.json "$pkg/"
          # The whole package, not just its top-level modules: sceneorg/ has
          # subpackages (core, naming, structure, cinema) and a flat *.py glob
          # silently shipped a plugin that cannot import itself.
          cp -r src/sceneorg "$pkg/sceneorg"
          find "$pkg/sceneorg" -name __pycache__ -type d -prune -exec rm -rf {} +
          cp -r src/vendor "$pkg/vendor"
          find "$pkg/vendor" -name __pycache__ -type d -prune -exec rm -rf {} +
          [ -d src/presets ] && cp -r src/presets "$pkg/presets"
          if [ -d src/plans ]; then mkdir -p "$pkg/plans"; cp src/plans/*.json "$pkg/plans/" 2>/dev/null || true; fi
          cp -r src/web "$pkg/web"

      - name: Zip
        run: cd dist && zip -r "Overseer-$VERSION.zip" Overseer

      # No generate_release_notes: GitHub's auto notes append a "Full Changelog"
      # compare link to THIS (internal) repo, which must never leak into the
      # public mirror. Curated notes are set afterwards by the release skill.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          name: Overseer ${{ env.VERSION }}
          files: dist/Overseer-${{ env.VERSION }}.zip
          body: |
            ## Installation

            Unzip the archive, copy the `Overseer` folder into your Cinema 4D
            `plugins` folder, restart Cinema 4D, then press `Shift+C` and search
            for **"Overseer"**.

  # Explicit call because the release above is created with GITHUB_TOKEN,
  # which never fires the `release` event for other workflows. Later
  # note edits (`gh release edit`, user token) re-sync via mirror.yml's
  # own `release: edited` trigger.
  mirror:
    needs: release
    uses: ./.github/workflows/mirror.yml
    with:
      tag: ${{ inputs.version || github.ref_name }}
    secrets: inherit
