name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.2.0) — tag + release are created with this name"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v7

      # --- Gate: same checks as CI ---
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python lint + tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          ruff check src tests
          pytest

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend tests + build (-> src/web/)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm run build

      # Pillow for C4D's interpreter (CPython 3.11, win_amd64) — shipped INSIDE
      # the plugin so the artist never pip-installs into Cinema's Python. The
      # wheel is fetched here rather than committed, so no binaries in git.
      - name: Vendor Pillow (cp311 / win_amd64)
        run: python tools/vendor_pillow.py

      # --- Package: same layout as deploy.ps1 produces ---
      - name: Assemble plugin folder
        run: |
          pkg=dist/SceneOrganizer
          mkdir -p "$pkg"
          cp src/scene_organizer.pyp "$pkg/"
          cp src/so_logo.jpg "$pkg/"
          cp src/config.example.json "$pkg/"
          # The whole package, not just its top-level modules: sceneorg/ has
          # subpackages (core, naming, structure, cinema) and a flat *.py glob
          # silently shipped a plugin that cannot import itself.
          cp -r src/sceneorg "$pkg/sceneorg"
          find "$pkg/sceneorg" -name __pycache__ -type d -prune -exec rm -rf {} +
          cp -r src/vendor "$pkg/vendor"
          find "$pkg/vendor" -name __pycache__ -type d -prune -exec rm -rf {} +
          [ -d src/presets ] && cp -r src/presets "$pkg/presets"
          if [ -d src/plans ]; then mkdir -p "$pkg/plans"; cp src/plans/*.json "$pkg/plans/" 2>/dev/null || true; fi
          cp -r src/web "$pkg/web"

      - name: Zip
        run: cd dist && zip -r "SceneOrganizer-$VERSION.zip" SceneOrganizer

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          name: Scene Organizer ${{ env.VERSION }}
          files: dist/SceneOrganizer-${{ env.VERSION }}.zip
          generate_release_notes: true
          body: |
            Fertig geschnürtes Cinema-4D-2024-Plugin. Installation: Zip entpacken und den
            Ordner `SceneOrganizer/` in einen C4D-Plugin-Ordner legen, z.B.
            `%APPDATA%\Maxon\Maxon Cinema 4D 2024_XXXXXXXX\plugins\` (kein Admin nötig)
            oder `C:\Program Files\Maxon Cinema 4D 2024\plugins\`.
