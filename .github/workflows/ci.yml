name: CI

# work happens on feature/* branches (PRs run CI); pushing main additionally triggers release.yml
# (main = release branch, see release.yml).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  plugin-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      # Lints src/overseer.pyp and blender_addon/__init__.py too
      # (both via extend-include in pyproject.toml).
      - name: Lint (ruff)
        run: ruff check src tests blender_addon

      - name: Syntax-check the plugin entry points
        run: |
          python -m py_compile src/overseer.pyp
          python -m py_compile blender_addon/__init__.py

  plugin-test:
    needs: plugin-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Cinema 4D 2024 embeds Python 3.11 — test against the real runtime.
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: pytest

      # The Blender host glue must import WITHOUT bpy (bpy is unavailable in CI,
      # exactly like c4d) — bpy is imported lazily inside functions, never at
      # module load. This guards that contract so the addon package stays
      # CI-importable like overseer/cinema stays c4d-free.
      - name: Import the Blender host without bpy
        run: python -c "import sys; sys.path.insert(0, 'src'); import overseer.blender.webapi, overseer.blender.host"

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc)
        run: pnpm exec tsc --noEmit

  frontend-test:
    needs: frontend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      # vite only: `pnpm run build` would re-run the tsc pass frontend-lint did.
      - name: Build (vite)
        run: pnpm exec vite build
