name: Mirror

# Keeps the public repo lukasguziel/overseer in sync with this dev repo:
#  - push to main touching README/docs  -> docs sync (README without the
#    Development section, FEATURES.md, screenshots)
#  - release published/edited            -> create or update the same release
#    (asset + body) in the public repo. Note: the release created by
#    release.yml uses GITHUB_TOKEN, which never triggers other workflows —
#    that path is covered by release.yml calling this workflow via
#    workflow_call. The `edited` trigger fires when the curated notes are
#    written with `gh release edit` (user token) and re-syncs the body.
#
# MIRROR_TOKEN: repo-scoped token of lukasguziel with write access to
# lukasguziel/overseer (GITHUB_TOKEN cannot push cross-repo).

on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/FEATURES.md
      - docs/screenshots/**
  release:
    types: [published, edited]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to mirror (e.g. v1.2.0)"
        required: true
        type: string

env:
  PUBLIC_REPO: lukasguziel/overseer

jobs:
  mirror-release:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MIRROR_TOKEN }}
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Mirror release (asset + notes) to the public repo
        run: |
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body > notes.md
          if gh release view "$TAG" --repo "$PUBLIC_REPO" > /dev/null 2>&1; then
            gh release edit "$TAG" --repo "$PUBLIC_REPO" \
              --title "Overseer $TAG" --notes-file notes.md
            gh release upload "$TAG" --repo "$PUBLIC_REPO" dist/* --clobber
          else
            gh release create "$TAG" --repo "$PUBLIC_REPO" \
              --title "Overseer $TAG" --notes-file notes.md dist/*
          fi

  sync-docs:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Sync README + docs to the public repo
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${MIRROR_TOKEN}@github.com/${PUBLIC_REPO}.git" mirror
          # README without the Development section (dev-repo internals)
          awk '/^## Development$/{skip=1} /^## Support$/{skip=0} !skip' README.md > mirror/README.md
          mkdir -p mirror/docs
          cp docs/FEATURES.md mirror/docs/FEATURES.md
          rm -rf mirror/docs/screenshots
          cp -r docs/screenshots mirror/docs/screenshots
          cd mirror
          git add -A
          if git diff --cached --quiet; then
            echo "Docs unchanged — nothing to sync."
          else
            git -c user.name="Lukas Guziel" -c user.email="lukasguziel@users.noreply.github.com" \
              commit -m "docs: sync from dev repo (${GITHUB_SHA::7})"
            git push
          fi
